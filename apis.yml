aid: windstream-holdings
name: Windstream Holdings
description: Windstream Holdings is a leading provider of advanced network communications and technology solutions including
  managed services, cloud computing, and broadband to consumers and businesses across the United States. The company operates
  the Kinetic broadband brand for consumer and small business customers and Windstream Enterprise (now Uniti Solutions) for
  business customers, offering SD-WAN, UCaaS, OfficeSuite UC, contact center services, and high-capacity network transport.
  Windstream delivers voice, data, and managed networking solutions to more than 18 states with over 2.1 million fiber-to-the-premise
  passings.
