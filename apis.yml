- aid: windstream-holdings:windstream-contact-center-api
  name: Windstream Enterprise Contact Center Services API
  description: The Windstream Enterprise Contact Center Services (CCS) API provides programmatic access to contact center
    operations, enabling developers to route calls, web chats, and text messages, manage agent states, configure tenants,
    and monitor queue activity. The REST API is complemented by a WebSocket interface for real-time event streaming.
