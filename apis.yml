apis:
- aid: windstream-holdings:windstream-voice-api
  name: Windstream Enterprise Voice API
  description: The Windstream Enterprise Voice API (silhouette) is a REST-based web service with WebSocket support for real-time
    events. It enables developers to make and receive calls, manage auto-attendants, control call routing, and configure Unified
    Communications settings for OfficeSuite UC deployments. The API accepts and delivers content in JSON format following
    HAL specifications.
  humanURL: https://api.solutions.uniti.com/voice.html
