naftiko: "1.0.0-alpha1"

info:
  label: "Windstream Enterprise Voice API"
  description: >-
    Shared consumer definition for the Windstream Enterprise Voice API (silhouette).
    Provides call control, extension management, auto-attendant configuration,
    and user management for OfficeSuite UC deployments.
  tags:
    - Windstream
    - Voice
    - UC
    - Telecom
    - Calls
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WINDSTREAM_VOICE_USERNAME: WINDSTREAM_VOICE_USERNAME
      WINDSTREAM_VOICE_PASSWORD: WINDSTREAM_VOICE_PASSWORD

capability:
  consumes:
    - type: http
      namespace: windstream-voice
      baseUri: https://webadmin.windstreamenterprise.com/api
      description: "Windstream Voice API for call control and UC management"
      authentication:
        type: basic
        username: "{{WINDSTREAM_VOICE_USERNAME}}"
        password: "{{WINDSTREAM_VOICE_PASSWORD}}"
      resources:
        - name: calls
          path: /calls
          description: "Active call management"
          operations:
            - name: list-active-calls
              method: GET
              description: "List Active Calls"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-call
              method: GET
              description: "Get Call Details"
              inputParameters:
                - name: callId
                  in: path
                  type: string
                  required: true
                  description: "Call identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: make-outbound-call
              method: POST
              description: "Make Outbound Call"
              body:
                type: json
                data:
                  from: "{{tools.from}}"
                  to: "{{tools.to}}"
                  caller_id: "{{tools.caller_id}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: control-call
              method: POST
              description: "Control Call"
              inputParameters:
                - name: callId
                  in: path
                  type: string
                  required: true
                  description: "Call identifier"
              body:
                type: json
                data:
                  action: "{{tools.action}}"
                  destination: "{{tools.destination}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: terminate-call
              method: DELETE
              description: "Terminate Call"
              inputParameters:
                - name: callId
                  in: path
                  type: string
                  required: true
                  description: "Call identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: extensions
          path: /extensions
          description: "Extension management"
          operations:
            - name: list-extensions
              method: GET
              description: "List Extensions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-extension
              method: GET
              description: "Get Extension Details"
              inputParameters:
                - name: extensionId
                  in: path
                  type: string
                  required: true
                  description: "Extension identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-extension
              method: PUT
              description: "Update Extension"
              inputParameters:
                - name: extensionId
                  in: path
                  type: string
                  required: true
                  description: "Extension identifier"
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  forward_to: "{{tools.forward_to}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: auto-attendants
          path: /auto-attendants
          description: "Auto-attendant management"
          operations:
            - name: list-auto-attendants
              method: GET
              description: "List Auto-attendants"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-auto-attendant
              method: POST
              description: "Create Auto-attendant"
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  greeting: "{{tools.greeting}}"
                  menu_options: "{{tools.menu_options}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-auto-attendant
              method: GET
              description: "Get Auto-attendant"
              inputParameters:
                - name: attendantId
                  in: path
                  type: string
                  required: true
                  description: "Auto-attendant identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: users
          path: /users
          description: "User management"
          operations:
            - name: list-users
              method: GET
              description: "List Users"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-user
              method: POST
              description: "Create User"
              body:
                type: json
                data:
                  username: "{{tools.username}}"
                  email: "{{tools.email}}"
                  extension: "{{tools.extension}}"
                  role: "{{tools.role}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: windstream-voice-shared-api
      resources:
        - path: /v1/calls
          name: calls
          operations:
            - method: GET
              name: list-calls
              description: "List Active Calls"
              call: "windstream-voice.list-active-calls"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: windstream-voice-shared-mcp
      transport: http
      tools:
        - name: list-calls
          description: "List active voice calls"
          hints:
            readOnly: true
            openWorld: true
          call: "windstream-voice.list-active-calls"
          outputParameters:
            - type: object
              mapping: "$."
