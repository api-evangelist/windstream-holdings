naftiko: 1.0.0-alpha2
info:
  label: Windstream Enterprise Voice API — calls
  description: 'Windstream Enterprise Voice API — calls. 5 operations. Lead operation: List Active Calls. Self-contained Naftiko
    capability covering one Windstream Holdings business surface.'
  tags:
  - Windstream Holdings
  - calls
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WINDSTREAM_HOLDINGS_API_KEY: WINDSTREAM_HOLDINGS_API_KEY
capability:
  consumes:
  - type: http
    namespace: windstream-voice-calls
    baseUri: https://{webadmin}/api
    description: Windstream Enterprise Voice API — calls business capability. Self-contained, no shared references.
    resources:
    - name: calls
      path: /calls
      operations:
      - name: listactivecalls
        method: GET
        description: List Active Calls
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: extension
          in: query
          type: string
          description: Filter calls by extension number
        - name: tenant
          in: query
          type: string
          description: Filter calls by tenant ID
    - name: calls-outbound
      path: /calls/outbound
      operations:
      - name: makeoutboundcall
        method: POST
        description: Make Outbound Call
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: calls-callId
      path: /calls/{callId}
      operations:
      - name: getcall
        method: GET
        description: Get Call Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: callId
          in: path
          type: string
          description: Unique call identifier
          required: true
      - name: controlcall
        method: POST
        description: Control Call
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: callId
          in: path
          type: string
          description: Unique call identifier
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: terminatecall
        method: DELETE
        description: Terminate Call
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: callId
          in: path
          type: string
          description: Unique call identifier
          required: true
    authentication:
      type: basic
      username: '{{env.WINDSTREAM_HOLDINGS_USER}}'
      password: '{{env.WINDSTREAM_HOLDINGS_PASS}}'
  exposes:
  - type: rest
    namespace: windstream-voice-calls-rest
    port: 8080
    description: REST adapter for Windstream Enterprise Voice API — calls. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/calls
      name: calls
      description: REST surface for calls.
      operations:
      - method: GET
        name: listactivecalls
        description: List Active Calls
        call: windstream-voice-calls.listactivecalls
        with:
          extension: rest.extension
          tenant: rest.tenant
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/calls/outbound
      name: calls-outbound
      description: REST surface for calls-outbound.
      operations:
      - method: POST
        name: makeoutboundcall
        description: Make Outbound Call
        call: windstream-voice-calls.makeoutboundcall
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/calls/{callid}
      name: calls-callid
      description: REST surface for calls-callId.
      operations:
      - method: GET
        name: getcall
        description: Get Call Details
        call: windstream-voice-calls.getcall
        with:
          callId: rest.callId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: controlcall
        description: Control Call
        call: windstream-voice-calls.controlcall
        with:
          callId: rest.callId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: terminatecall
        description: Terminate Call
        call: windstream-voice-calls.terminatecall
        with:
          callId: rest.callId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: windstream-voice-calls-mcp
    port: 9090
    transport: http
    description: MCP adapter for Windstream Enterprise Voice API — calls. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-active-calls
      description: List Active Calls
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: windstream-voice-calls.listactivecalls
      with:
        extension: tools.extension
        tenant: tools.tenant
      outputParameters:
      - type: object
        mapping: $.
    - name: make-outbound-call
      description: Make Outbound Call
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: windstream-voice-calls.makeoutboundcall
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-call-details
      description: Get Call Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: windstream-voice-calls.getcall
      with:
        callId: tools.callId
      outputParameters:
      - type: object
        mapping: $.
    - name: control-call
      description: Control Call
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: windstream-voice-calls.controlcall
      with:
        callId: tools.callId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: terminate-call
      description: Terminate Call
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: windstream-voice-calls.terminatecall
      with:
        callId: tools.callId
      outputParameters:
      - type: object
        mapping: $.
